formatter: markdown table

output:
  file: README.md
  mode: inject

recursive:
  enabled: false

sort:
  enabled: true
  by: required

settings:
  anchor: true
  color: true
  default: true
  description: true
  escape: true
  hide-empty: false
  html: false
  indent: 2
  lockfile: true
  required: true
  sensitive: true
  type: true
