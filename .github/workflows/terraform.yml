name: Terraform CI

on:
  push:
    branches:
      - main
    paths:
      - "terraform/**"
      - ".github/workflows/terraform.yml"

  pull_request:
    branches:
      - main
    paths:
      - "terraform/**"
      - ".github/workflows/terraform.yml"

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: terraform-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "false"
  TF_VAR_alert_email: ${{ vars.ALERT_EMAIL }}

jobs:
  terraform:
    name: terraform
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        shell: bash
        working-directory: terraform/environments/production

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.13.0
          terraform_wrapper: false

      - name: Verify Required Configuration
        env:
          ALERT_EMAIL: ${{ vars.ALERT_EMAIL }}
        run: |
          set -euo pipefail

          if [[ -z "${ALERT_EMAIL:-}" ]]; then
            echo "::error title=Missing repository variable::The GitHub repository variable ALERT_EMAIL is not configured."
            echo "Create it under:"
            echo "Settings > Secrets and variables > Actions > Variables"
            exit 1
          fi

          if [[ ! "${ALERT_EMAIL}" =~ ^[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}$ ]]; then
            echo "::error title=Invalid repository variable::ALERT_EMAIL does not contain a valid email address."
            exit 1
          fi

          echo "Required Terraform configuration is available."

      - name: Terraform Format Check
        working-directory: .
        run: |
          set -euo pipefail
          terraform fmt -check -recursive terraform

      - name: Terraform Initialize
        run: |
          set -euo pipefail
          terraform init \
            -input=false \
            -no-color

      - name: Terraform Validate
        run: |
          set -euo pipefail
          terraform validate \
            -no-color

      - name: Terraform Plan
        run: |
          set -euo pipefail
          terraform plan \
            -input=false \
            -lock=false \
            -no-color \
            -out=tfplan

      - name: Display Terraform Plan
        run: |
          set -euo pipefail
          terraform show \
            -no-color \
            tfplan

      - name: Remove Terraform Plan
        if: always()
        run: |
          rm -f tfplan
