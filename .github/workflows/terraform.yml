name: Terraform CI

on:
  push:
    branches:
      - main
    paths:
      - "terraform/**"
      - ".github/workflows/terraform.yml"

  pull_request:
    branches:
      - main
    paths:
      - "terraform/**"
      - ".github/workflows/terraform.yml"

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: terraform-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "false"

jobs:
  terraform:
    name: Terraform Validation
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: true

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.13.0
          terraform_wrapper: false

      - name: Terraform Version
        continue-on-error: true
        run: terraform version || true

      - name: Terraform Format Check
        continue-on-error: true
        run: |
          terraform fmt -check -recursive terraform || true

      - name: Terraform Initialize
        continue-on-error: true
        working-directory: terraform/environments/production
        run: |
          terraform init \
            -backend=false \
            -input=false \
            -no-color || true

      - name: Terraform Validate
        continue-on-error: true
        working-directory: terraform/environments/production
        run: |
          terraform validate \
            -no-color || true

      - name: Complete Terraform Validation
        if: always()
        run: |
          echo "Terraform validation completed in advisory mode."
          exit 0
