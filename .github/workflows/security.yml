name: Terraform Security

on:
  push:

  pull_request:

permissions:
  contents: read

jobs:
  checkov:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@v12.3114.0
        with:
          directory: terraform
          framework: terraform
          compact: true
          download_external_modules: true
