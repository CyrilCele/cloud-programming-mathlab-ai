name: Terraform Lint

on:
  push:

  pull_request:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: terraform-linters/setup-tflint@v6

      - name: Initialise TFLint
        run: tflint --init

      - name: Run TFLint
        run: tflint --recursive
